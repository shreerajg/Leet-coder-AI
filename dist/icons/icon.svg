<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Glow effect -->
  <circle cx="64" cy="64" r="38" fill="#6366f1" opacity="0.08"/>
  <!-- Brain/circuit nodes -->
  <!-- Central node -->
  <circle cx="64" cy="64" r="8" fill="url(#glow)" opacity="0.95"/>
  <!-- Satellite nodes -->
  <circle cx="64" cy="32" r="5" fill="#818cf8" opacity="0.8"/>
  <circle cx="90" cy="50" r="5" fill="#818cf8" opacity="0.8"/>
  <circle cx="90" cy="78" r="5" fill="#818cf8" opacity="0.8"/>
  <circle cx="64" cy="96" r="5" fill="#818cf8" opacity="0.8"/>
  <circle cx="38" cy="78" r="5" fill="#818cf8" opacity="0.8"/>
  <circle cx="38" cy="50" r="5" fill="#818cf8" opacity="0.8"/>
  <!-- Connections -->
  <line x1="64" y1="64" x2="64" y2="32" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <line x1="64" y1="64" x2="90" y2="50" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <line x1="64" y1="64" x2="90" y2="78" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <line x1="64" y1="64" x2="64" y2="96" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <line x1="64" y1="64" x2="38" y2="78" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <line x1="64" y1="64" x2="38" y2="50" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <!-- Outer ring connections -->
  <line x1="64" y1="32" x2="90" y2="50" stroke="#4f46e5" stroke-width="1" opacity="0.4"/>
  <line x1="90" y1="50" x2="90" y2="78" stroke="#4f46e5" stroke-width="1" opacity="0.4"/>
  <line x1="90" y1="78" x2="64" y2="96" stroke="#4f46e5" stroke-width="1" opacity="0.4"/>
  <line x1="64" y1="96" x2="38" y2="78" stroke="#4f46e5" stroke-width="1" opacity="0.4"/>
  <line x1="38" y1="78" x2="38" y2="50" stroke="#4f46e5" stroke-width="1" opacity="0.4"/>
  <line x1="38" y1="50" x2="64" y2="32" stroke="#4f46e5" stroke-width="1" opacity="0.4"/>
</svg>
